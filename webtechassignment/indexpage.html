<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
   <style>
     * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #333;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo {
            color: #fff;
            font-size: 24px;
        }
        .navbar .nav-links {
            list-style: none;
            display: flex;
        }

        .navbar .nav-links li {
            margin: 0 10px;
        }

        .navbar .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.3s ease;
        }
        .hero {
            background: url('') no-repeat center center/cover;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-content {
            color: red;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .hero-content p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hero-content .btn {
            padding: 10px 20px;
            background-color: #ff7f50;
            color: white;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .hero-content .btn:hover {
            background-color: #ff6347;
        }
        .products {
            padding: 50px 0;
            text-align: center;
        }

        .products h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .product-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .product-card {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            width: 200px;
            text-align: center;
        }
        .product-card img {
            width: 100%;
            border-radius: 8px;
        }

        .product-card h3 {
            margin: 10px 0;
        }

        .product-card p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .add-to-cart {
            padding: 10px 20px;
            background-color: #ff7f50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .add-to-cart:hover {
            background-color: #ff6347;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
   </style>
</head>
<body>
    <script>
        // Script for adding interactivity

        document.querySelectorAll('.add-to-cart').forEach(button => {
            button.addEventListener('click', () => {
                alert('Item added to cart!');
            });
        });
    </script>
    <nav class="navbar">
        <div class="logo">ShopNow</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Cart</a></li>
        </ul>
    </nav>
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to ShopNow for students</h1>
            <p>Your one-stop online shop for all your needs!</p>
            <a href="#" class="btn">Shop Now</a>
        </div>
    </section>
    <section class="products">
        <h2>Featured Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="C:\Users\vighnesh raikar\webtechassignment\download.jpg" alt="Product 1">
                <h3>Textbooks & Course Materials</h3>
                
                <button class="add-to-cart">click</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\vighnesh raikar\webtechassignment\download (1).jpg" alt="Product 2">
                <h3>Academic Software & Tools</h3>
                
                <button class="add-to-cart">click</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\vighnesh raikar\webtechassignment\18263608-7-cute-and-colorful-cartoon-school-supplies.jpg" alt="Product 3">
                <h3>Stationery & Supplies</h3>
              
                <button class="add-to-cart">click</button>
            </div>
        </div>
    </section>
<footer>
        <p>© 2024 ShopNow. All rights reserved.</p>
    </footer>
</body>
</html>
